<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="mb-4">Panel de Administración</h1>

        <a href="{{ url_for('agregar_producto') }}" class="btn btn-success mb-3">Agregar Producto</a>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                    <td>${{ "%.2f"|format(p[3]) }}</td>
                    <td>{{ p[4] }}</td>
                    <td>{{ p[5] }}</td>
<td>
    <a href="{{ url_for('editar_producto', producto_id=p[0]) }}" class="btn btn-sm btn-primary">Editar</a>
    <form action="{{ url_for('eliminar_producto', producto_id=p[0]) }}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
    </form>
</td>

                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
