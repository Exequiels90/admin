<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Admin - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h1 class="mb-4">Catálogo de Productos</h1>
        <a href="/nuevo_producto" class="btn btn-success mb-3">➕ Nuevo Producto</a>
        <a href="/categorias" class="btn btn-secondary mb-3 ms-2">📂 Categorías</a>


        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Activo</th>
                </tr>
            </thead>
            <tbody>
                {% for producto in productos %}
                <tr>
                    <td>{{ producto['id_producto'] }}</td>
                    <td>{{ producto['nombre'] }}</td>
                    <td>{{ producto['categoria'] or "Sin categoría" }}</td>
                    <td>{{ "Sí" if producto['activo'] else "No" }}</td>
                    <td>
                        <a href="{{ url_for('editar_producto', id_producto=producto['id_producto']) }}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{{ url_for('eliminar_producto', id_producto=producto['id_producto']) }}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
