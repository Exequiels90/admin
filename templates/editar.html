<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="mb-4">Editar Producto</h1>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ producto[1] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control">{{ producto[2] }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" name="precio" step="0.01" class="form-control" value="{{ producto[3] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control" value="{{ producto[4] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <input type="text" name="categoria" class="form-control" value="{{ producto[5] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Género</label>
                <input type="text" name="genero" class="form-control" value="{{ producto[6] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Talle</label>
                <input type="text" name="talle" class="form-control" value="{{ producto[7] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre de la Imagen (ej: zapatilla.jpg)</label>
                <input type="text" name="imagen" class="form-control" value="{{ producto[8] }}">
            </div>
            <button type="submit" class="btn btn-success">Guardar Cambios</button>
            <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
