{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h2 class="text-warning mb-4">✏️ Editar Producto</h2>
    <form method="POST" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ producto[1] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto[3] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ producto[4] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Imagen (URL)</label>
            <input type="text" name="imagen" class="form-control" value="{{ producto[8] }}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Categoría</label>
            <input type="text" name="categoria" class="form-control" value="{{ producto[5] }}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Género</label>
            <input type="text" name="genero" class="form-control" value="{{ producto[6] }}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Talle</label>
            <input type="text" name="talle" class="form-control" value="{{ producto[7] }}">
        </div>

        <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3">{{ producto[2] }}</textarea>
        </div>

        <div class="col-12 text-end">
            <a href="{{ url_for('admin') }}" class="btn btn-secondary">🔙 Volver</a>
            <button type="submit" class="btn btn-warning">Actualizar</button>
        </div>
    </form>
</div>
{% endblock %}
