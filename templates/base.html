<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Panel de administración{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }
        .sidebar h4 {
            margin-bottom: 1rem;
        }
        .sidebar hr {
            border-color: #495057;
        }
        .sidebar h6 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 0.3rem;
            transition: background-color 0.2s ease;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #495057;
        }
        .content {
            flex-grow: 1;
            padding: 30px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <!-- Menú lateral -->
    <nav class="sidebar">
        <h4>Menú</h4>
        <hr />
        <h6>Categorías</h6>
        <a href="{{ url_for('listar_categorias') }}" class="{% if request.endpoint == 'listar_categorias' %}active{% endif %}">📂 Ver categorías</a>
        <a href="{{ url_for('nueva_categoria') }}" class="{% if request.endpoint == 'nueva_categoria' %}active{% endif %}">➕ Nueva categoría</a>

        <h6>Productos</h6>
        <a href="{{ url_for('admin') }}" class="{% if request.endpoint == 'admin' %}active{% endif %}">📦 Ver productos</a>
        <a href="{{ url_for('nuevo_producto') }}" class="{% if request.endpoint == 'nuevo_producto' %}active{% endif %}">➕ Nuevo producto</a>

        <h6>Ventas</h6>
        <a href="#">📊 Informes</a>
        <a href="#">➕ Registrar venta</a>

        <h6 class="mt-4">Configuración</h6>
        <a href="#">⚙️ Usuarios</a>
        <a href="#">🔒 Roles y permisos</a>
    </nav>

    <!-- Contenido principal -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
