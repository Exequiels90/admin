<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            max-height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">Catálogo de Productos</h1>
        <div class="row g-4">
            {% for p in productos %}
            <div class="col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    {% if p[8] %}
                    <img src="{{ url_for('static', filename='img/' ~ p[8]) }}" class="card-img-top" alt="{{ p[1] }}">
                    {% else %}
                    <img src="{{ url_for('static', filename='img/no-img.png') }}" class="card-img-top" alt="Sin imagen">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ p[1] }}</h5>
                        <p class="card-text text-muted">{{ p[2][:70] }}...</p>
                        <p class="mb-1"><strong>Precio:</strong> ${{ "%.2f"|format(p[3]) }}</p>
                        <p class="mb-1"><strong>Talle:</strong> {{ p[7] }}</p>
                        <p class="mb-1"><strong>Stock:</strong> {{ p[4] }}</p>
                        <span class="badge bg-secondary">{{ p[5] }}</span>
                        <span class="badge bg-info text-dark">{{ p[6] }}</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
