{% extends "base.html" %}

{% block title %}Lista de productos{% endblock %}

{% block content %}


        <h1 class="mb-4">Agregar Nuevo Producto</h1>
<form method="POST">
    <div class="mb-3">
        <label for="codigo" class="form-label">Código (mínimo 6 caracteres)</label>
        <input type="text" name="codigo" id="codigo" class="form-control" minlength="6" required>
    </div>
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" name="nombre" id="nombre" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="categoria_id" class="form-label">Categoría</label>
        <select name="categoria_id" id="categoria_id" class="form-select" required>
            {% for categoria in categorias %}
            <option value="{{ categoria['id_categoria'] }}">{{ categoria['nombre'] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="precio_compra" class="form-label">Precio de compra</label>
        <input type="number" step="0.01" name="precio_compra" id="precio_compra" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="precio_venta" class="form-label">Precio de venta</label>
        <input type="number" step="0.01" name="precio_venta" id="precio_venta" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Guardar producto</button>
</form>


    </div>
</body>
{% endblock %}
